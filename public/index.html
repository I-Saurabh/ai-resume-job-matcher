<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumePro | AI-Powered Resume Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Merriweather:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Layout */
        .editor-container { height: calc(100vh - 80px); }
        .preview-pane { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-y: auto; 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
        }
        
        /* The Resume Canvas */
        .resume-canvas {
            width: 210mm; 
            min-height: 297mm; 
            background: white; 
            padding: 18mm 22mm;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25); 
            transition: all 0.3s ease;
            color: #1a1a1a; 
            line-height: 1.6; 
            word-wrap: break-word;
        }

        /* --- TEMPLATES --- */
        /* 1. Professional (ATS Standard) */
        .tpl-pro .section-title { 
            border-bottom: 2.5pt solid #667eea; 
            font-weight: 700; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            margin-top: 18px; 
            font-size: 11pt; 
            color: #667eea;
            letter-spacing: 0.5px;
        }
        .tpl-pro .item-header { display: flex; justify-content: space-between; font-weight: 700; font-size: 10.5pt; color: #1a1a1a; }
        .tpl-pro .item-sub { font-style: italic; color: #555; font-size: 10pt; font-weight: 500; }
        .tpl-pro h1 { font-size: 26pt; font-weight: 800; color: #1a1a1a; margin-bottom: 4pt; letter-spacing: -0.5px; }
        .tpl-pro .contact-info { font-size: 9.5pt; color: #555; line-height: 1.4; }

        /* 2. Modern (Accented) */
        .tpl-modern { border-top: 6px solid #667eea; }
        .tpl-modern .section-title { 
            color: #667eea; 
            font-weight: 800; 
            font-size: 11pt; 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
            margin: 16px 0 8px 0;
            border-left: 4px solid #667eea;
            padding-left: 8px;
        }
        .tpl-modern h1 { 
            font-size: 28pt; 
            font-weight: 800; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4pt;
        }

        /* 3. Elegant (Centered) */
        .tpl-elegant { text-align: center; }
        .tpl-elegant h1 { 
            font-family: 'Merriweather', serif;
            font-size: 32pt; 
            font-weight: 700; 
            color: #1a1a1a; 
            margin-bottom: 8pt;
            letter-spacing: -1px;
        }
        .tpl-elegant .section-title { 
            border-top: 1px solid #ddd; 
            border-bottom: 1px solid #ddd; 
            padding: 8px 0; 
            margin: 16px auto; 
            font-weight: 700;
            color: #333;
        }

        .input-group { 
            border-left: 3px solid #e0e7ff; 
            padding-left: 12px; 
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        .input-group:focus-within { 
            border-left-color: #667eea;
            background: #f8f9ff;
            padding-left: 14px;
        }
        
        .hidden { display: none !important; }
        @media print { .no-print { display: none; } }

        /* Navigation & Button Styles */
        .nav-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-primary { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .import-box {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border: 2px dashed #667eea;
            transition: all 0.3s;
        }
        .import-box:hover { 
            border-color: #764ba2;
            background: linear-gradient(135deg, #667eea25 0%, #764ba225 100%);
        }

        .label-premium {
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 0.5px;
            color: #667eea;
            text-transform: uppercase;
        }

        input, textarea, select {
            transition: all 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .parsing-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Navigation -->
    <nav class="h-20 nav-gradient flex justify-between items-center px-8 z-50 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 backdrop-blur text-white w-10 h-10 rounded-lg flex items-center justify-center font-bold text-lg">R</div>
            <div>
                <span class="font-bold text-2xl tracking-tight text-white block">ResumePro</span>
                <span class="text-xs text-white/70">AI-Powered Resume Builder</span>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <select id="tplSelect" onchange="updateTemplate(this.value)" class="bg-white/10 backdrop-blur text-white border border-white/20 text-sm rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-white/50 cursor-pointer font-medium">
                <option value="tpl-pro" style="color: #1a1a1a;">Template: Professional</option>
                <option value="tpl-modern" style="color: #1a1a1a;">Template: Modern</option>
                <option value="tpl-elegant" style="color: #1a1a1a;">Template: Elegant</option>
            </select>
            <button onclick="downloadPDF()" class="btn-primary px-7 py-2.5 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg">
                ⬇️ Download PDF
            </button>
            <div id="authArea">
                <button id="loginBtn" class="text-sm font-semibold text-white/80 hover:text-white transition">Sign In</button>
            </div>
        </div>
    </nav>

    <div class="flex editor-container">
        <!-- Sidebar Editor -->
        <aside class="w-1/3 bg-white overflow-y-auto p-8 shadow-xl border-r border-gray-100">
            
            <!-- Smart Import -->
            <div class="mb-10 import-box p-6 rounded-2xl">
                <h3 class="text-gray-800 font-bold text-sm uppercase mb-1">📄 Smart Import</h3>
                <p class="text-xs text-gray-500 mb-4">Upload your LinkedIn PDF and we'll extract your data</p>
                <input type="file" id="pdfUpload" class="hidden" accept="application/pdf">
                <button onclick="document.getElementById('pdfUpload').click()" class="w-full bg-white border-2 border-dashed border-gray-300 text-gray-700 py-3 rounded-xl font-semibold hover:border-blue-500 hover:bg-blue-50 transition">
                    📥 Upload LinkedIn PDF
                </button>
                <p class="text-xs text-gray-400 mt-3 text-center">Auto-extracts experience, education & skills</p>
                <div id="parseStatus" class="mt-3 text-xs text-gray-500 hidden">
                    <span class="parsing-indicator"></span><span id="parseMsg">Processing...</span>
                </div>
            </div>

            <!-- Editor Sections -->
            <div class="space-y-10">
                
                <!-- 1. Contact -->
                <section>
                    <h3 class="label-premium mb-5 text-gray-600">👤 Contact Information</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="text-xs font-semibold text-gray-500 mb-1.5 block">Full Name *</label>
                            <input type="text" id="in-name" oninput="sync()" class="w-full border-b-2 border-gray-200 py-2 focus:border-blue-500 outline-none font-semibold text-base">
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-gray-500 mb-1.5 block">Email</label>
                            <input type="email" id="in-email" oninput="sync()" class="w-full border-b-2 border-gray-200 py-2 focus:border-blue-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-gray-500 mb-1.5 block">Phone</label>
                            <input type="tel" id="in-phone" oninput="sync()" class="w-full border-b-2 border-gray-200 py-2 focus:border-blue-500 outline-none text-sm">
                        </div>
                        <div class="col-span-2">
                            <label class="text-xs font-semibold text-gray-500 mb-1.5 block">Location</label>
                            <input type="text" id="in-loc" oninput="sync()" class="w-full border-b-2 border-gray-200 py-2 focus:border-blue-500 outline-none text-sm" placeholder="City, Country">
                        </div>
                    </div>
                </section>

                <!-- 2. Summary -->
                <section>
                    <h3 class="label-premium mb-5 text-gray-600">✨ Professional Summary</h3>
                    <textarea id="in-sum" oninput="sync()" rows="4" class="w-full border-2 border-gray-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none bg-gray-50 resize-none"></textarea>
                </section>

                <!-- 3. Experience -->
                <section id="sec-exp">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="label-premium text-gray-600">💼 Experience</h3>
                        <button onclick="addItem('exp')" class="text-blue-600 text-xs font-bold hover:text-blue-700 transition">+ Add Entry</button>
                    </div>
                    <div id="list-exp" class="space-y-6"></div>
                </section>

                <!-- 4. Education -->
                <section id="sec-edu">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="label-premium text-gray-600">🎓 Education</h3>
                        <button onclick="addItem('edu')" class="text-blue-600 text-xs font-bold hover:text-blue-700 transition">+ Add Entry</button>
                    </div>
                    <div id="list-edu" class="space-y-6"></div>
                </section>

                <!-- 5. Skills -->
                <section>
                    <h3 class="label-premium mb-5 text-gray-600">🛠️ Skills</h3>
                    <textarea id="in-skills" oninput="sync()" placeholder="Java, Spring Boot, React, AWS..." rows="3" class="w-full border-2 border-gray-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none bg-gray-50 resize-none"></textarea>
                    <p class="text-xs text-gray-400 mt-2">Separate skills with commas</p>
                </section>
            </div>
            <div class="h-20"></div>
        </aside>

        <!-- Preview Pane -->
        <main class="flex-1 preview-pane">
            <div id="resume-canvas" class="tpl-pro">
                <!-- Content Injected via JS -->
            </div>
        </main>
    </div>

    <script>
        // --- 1. CONFIG & DATA STATE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCVgVQGsAReD3zG1NREX9dcl1HifizllaE",
            authDomain: "resume-builder-d94ec.firebaseapp.com",
            projectId: "resume-builder-d94ec",
            storageBucket: "resume-builder-d94ec.firebasestorage.app",
            messagingSenderId: "524704602425",
            appId: "1:524704602425:web:0a7569ae47e80665c670e8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let resume = {
            template: 'tpl-pro',
            name: 'Your Name',
            email: 'your.email@example.com',
            phone: '+1 (555) 123-4567',
            location: 'City, Country',
            summary: '',
            skills: '',
            experience: [],
            education: []
        };

        // --- 2. ENGINE: ADD/REMOVE ITEMS ---
        function addItem(type) {
            const item = type === 'exp' 
                ? { company: '', role: '', date: '', desc: '' }
                : { school: '', degree: '', date: '', score: '' };
            resume[type === 'exp' ? 'experience' : 'education'].push(item);
            renderEditor();
            sync();
        }

        function removeItem(type, index) {
            resume[type === 'exp' ? 'experience' : 'education'].splice(index, 1);
            renderEditor();
            sync();
        }

        // --- 3. UI: EDITOR RENDERING ---
        function renderEditor() {
            // Static Fields
            document.getElementById('in-name').value = resume.name;
            document.getElementById('in-email').value = resume.email;
            document.getElementById('in-phone').value = resume.phone;
            document.getElementById('in-loc').value = resume.location;
            document.getElementById('in-sum').value = resume.summary;
            document.getElementById('in-skills').value = resume.skills;

            // List: Experience
            const expList = document.getElementById('list-exp');
            expList.innerHTML = "";
            resume.experience.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "input-group border-l-4 p-4 bg-gradient-to-r from-blue-50 to-purple-50 rounded-r-lg relative";
                div.innerHTML = `
                    <button onclick="removeItem('exp', ${i})" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 text-sm font-bold transition">✕</button>
                    <input type="text" placeholder="Company Name" value="${item.company}" oninput="resume.experience[${i}].company=this.value;sync()" class="w-full font-bold bg-transparent outline-none mb-3 text-sm" required>
                    <input type="text" placeholder="Job Title" value="${item.role}" oninput="resume.experience[${i}].role=this.value;sync()" class="w-full text-sm bg-transparent outline-none mb-2">
                    <input type="text" placeholder="Jan 2022 - Present" value="${item.date}" oninput="resume.experience[${i}].date=this.value;sync()" class="w-full text-xs text-blue-600 font-medium bg-transparent outline-none mb-2">
                    <textarea placeholder="Key achievements and responsibilities..." oninput="resume.experience[${i}].desc=this.value;sync()" class="w-full text-xs bg-white border border-gray-200 p-2 rounded resize-none focus:ring-2 focus:ring-blue-300">${item.desc}</textarea>
                `;
                expList.appendChild(div);
            });

            // List: Education
            const eduList = document.getElementById('list-edu');
            eduList.innerHTML = "";
            resume.education.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "input-group border-l-4 p-4 bg-gradient-to-r from-green-50 to-blue-50 rounded-r-lg relative";
                div.innerHTML = `
                    <button onclick="removeItem('edu', ${i})" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 text-sm font-bold transition">✕</button>
                    <input type="text" placeholder="University / School" value="${item.school}" oninput="resume.education[${i}].school=this.value;sync()" class="w-full font-bold bg-transparent outline-none mb-3 text-sm" required>
                    <input type="text" placeholder="Degree & Major" value="${item.degree}" oninput="resume.education[${i}].degree=this.value;sync()" class="w-full text-sm bg-transparent outline-none mb-2">
                    <div class="flex gap-2">
                        <input type="text" placeholder="2019 - 2023" value="${item.date}" oninput="resume.education[${i}].date=this.value;sync()" class="flex-1 text-xs text-blue-600 bg-transparent outline-none">
                        <input type="text" placeholder="GPA (Optional)" value="${item.score}" oninput="resume.education[${i}].score=this.value;sync()" class="w-1/3 text-xs bg-transparent outline-none">
                    </div>
                `;
                eduList.appendChild(div);
            });
        }

        // --- 4. ENGINE: REAL-TIME PREVIEW ---
        function sync() {
            // Update Data from Static Fields
            resume.name = document.getElementById('in-name').value || 'Your Name';
            resume.email = document.getElementById('in-email').value || 'email@example.com';
            resume.phone = document.getElementById('in-phone').value || '+1 (555) 000-0000';
            resume.location = document.getElementById('in-loc').value || 'City, Country';
            resume.summary = document.getElementById('in-sum').value;
            resume.skills = document.getElementById('in-skills').value;

            const canvas = document.getElementById('resume-canvas');
            canvas.className = `resume-canvas ${resume.template}`;

            let html = `
                <div class="text-center mb-6">
                    <h1>${resume.name}</h1>
                    <div class="contact-info">
                        ${resume.email ? '<span>' + resume.email + '</span>' : ''}
                        ${resume.phone ? '<span>•</span><span>' + resume.phone + '</span>' : ''}
                        ${resume.location ? '<span>•</span><span>' + resume.location + '</span>' : ''}
                    </div>
                </div>
            `;

            if(resume.summary) {
                html += `<div class="section-title">Professional Summary</div><p class="text-[10pt] mb-2">${resume.summary}</p>`;
            }

            if(resume.experience.length > 0) {
                html += `<div class="section-title">Experience</div>`;
                resume.experience.forEach(exp => {
                    if(exp.company || exp.role) {
                        html += `
                            <div class="mb-4">
                                <div class="item-header"><span>${exp.company || 'Company'}</span><span>${exp.date}</span></div>
                                <div class="item-sub">${exp.role}</div>
                                <div class="text-[9.5pt] mt-1 whitespace-pre-line">${exp.desc}</div>
                            </div>
                        `;
                    }
                });
            }

            if(resume.education.length > 0) {
                html += `<div class="section-title">Education</div>`;
                resume.education.forEach(edu => {
                    if(edu.school || edu.degree) {
                        html += `
                            <div class="mb-3">
                                <div class="item-header"><span>${edu.school || 'School'}</span><span>${edu.date}</span></div>
                                <div class="item-sub">${edu.degree} ${edu.score ? '— ' + edu.score : ''}</div>
                            </div>
                        `;
                    }
                });
            }

            if(resume.skills) {
                html += `<div class="section-title">Skills</div><p class="text-[10pt]">${resume.skills}</p>`;
            }

            canvas.innerHTML = html;
        }

        function updateTemplate(val) {
            resume.template = val;
            sync();
        }

        // --- 5. IMPROVED SMART PDF PARSER ---
        document.getElementById('pdfUpload').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const statusEl = document.getElementById('parseStatus');
            statusEl.classList.remove('hidden');
            document.getElementById('parseMsg').innerText = 'Reading PDF...';

            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = [];

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        content.items.forEach(item => fullText.push(item.str));
                    }
                    
                    document.getElementById('parseMsg').innerText = 'Processing data...';
                    setTimeout(() => {
                        processStructuredText(fullText.join("\n"));
                        statusEl.classList.add('hidden');
                    }, 500);
                } catch (err) {
                    document.getElementById('parseMsg').innerText = 'Error reading PDF. Please try again.';
                    console.error(err);
                    setTimeout(() => statusEl.classList.add('hidden'), 2000);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        function processStructuredText(text) {
            // Keywords to filter out (headers, footers, etc.)
            const filterKeywords = ['Contact', 'Links', 'Languages', 'Certifications', 'Licenses', 'Volunteer', 'Publications', 'Projects', 'Patents'];
            
            // Reset Arrays
            resume.experience = [];
            resume.education = [];

            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            // 1. Extract Name (longest string in first 5 lines, excluding known headers)
            let nameIdx = 0;
            for(let i = 0; i < Math.min(5, lines.length); i++) {
                if(!filterKeywords.some(kw => lines[i].includes(kw)) && lines[i].length < 50 && lines[i].length > 3) {
                    nameIdx = i;
                    break;
                }
            }
            resume.name = lines[nameIdx] || "Your Name";

            // 2. Extract Summary (look between Summary and Experience/Education)
            const summaryMatch = text.match(/(?:About|Summary|Professional Summary)\s*\n([\s\S]*?)(?:\n(?:Experience|EXPERIENCE|Education|EDUCATION|Skills|Top Skills))/i);
            if (summaryMatch) {
                resume.summary = summaryMatch[1].split('\n').map(l => l.trim()).filter(l => l.length > 0).join(' ').substring(0, 300);
            }

            // 3. Extract Skills
            const skillsMatch = text.match(/(?:Top Skills|Skills)\s*\n([\s\S]*?)(?:\n(?:Experience|EXPERIENCE|Education|EDUCATION|Languages|Certifications))/i);
            if (skillsMatch) {
                const skillText = skillsMatch[1].split('\n').map(l => l.trim()).filter(l => l.length > 0 && !l.includes('Endorsements'));
                resume.skills = skillText.slice(0, 15).join(', ');
            }

            // 4. Advanced Experience Parsing
            const expRegex = /(?:Experience|EXPERIENCE)([\s\S]*?)(?=Education|EDUCATION|Skills|Top Skills|$)/i;
            const expMatch = text.match(expRegex);
            if (expMatch) {
                const expText = expMatch[1];
                const jobBlocks = expText.split(/\n(?=[A-Z][a-z]+\s+(?:at|–|-|\|))/);
                
                jobBlocks.forEach(block => {
                    const blockLines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    if (blockLines.length === 0) return;

                    let company = '', role = '', date = '', desc = '';

                    // First non-empty line is usually company + role
                    const firstLine = blockLines[0];
                    const parts = firstLine.split(/\s+(?:at|–|-|\|)\s+/);
                    
                    if (parts.length === 2) {
                        role = parts[0];
                        company = parts[1];
                    } else {
                        company = firstLine;
                    }

                    // Find dates (lines containing years or month names)
                    for(let i = 1; i < blockLines.length; i++) {
                        if (blockLines[i].match(/(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec|Present|\d{4})/i)) {
                            date = blockLines[i];
                            desc = blockLines.slice(i + 1).join('\n');
                            break;
                        } else if (i === 1) {
                            desc = blockLines.slice(i).join('\n');
                        }
                    }

                    if (company.length > 2 && company.length < 100) {
                        resume.experience.push({
                            company: company.trim(),
                            role: role.trim(),
                            date: date.trim(),
                            desc: desc.substring(0, 300).trim()
                        });
                    }
                });
            }

            // 5. Education Parsing
            const eduRegex = /(?:Education|EDUCATION)([\s\S]*?)(?=Skills|Top Skills|$)/i;
            const eduMatch = text.match(eduRegex);
            if (eduMatch) {
                const eduText = eduMatch[1];
                const schools = eduText.split(/\n(?=[A-Z])/);
                
                schools.forEach(school => {
                    const lines = school.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    if (lines.length === 0) return;
                    
                    let schoolName = lines[0];
                    let degree = lines[1] || '';
                    let date = '';
                    
                    for(let i = 2; i < lines.length; i++) {
                        if (lines[i].match(/\d{4}/)) {
                            date = lines[i];
                            break;
                        }
                    }
                    
                    if (schoolName.length > 3 && schoolName.length < 100 && !filterKeywords.some(kw => schoolName.includes(kw))) {
                        resume.education.push({
                            school: schoolName,
                            degree: degree,
                            date: date,
                            score: ''
                        });
                    }
                });
            }

            renderEditor();
            sync();
            alert("✅ Parsing complete! Data has been extracted and populated. Please review and edit as needed.");
        }

        // Initial Run
        renderEditor();
        sync();

        function downloadPDF() {
            const element = document.getElementById('resume-canvas');
            const opt = { 
                margin: 0, 
                filename: 'resume-' + Date.now() + '.pdf', 
                html2canvas: { scale: 3 }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
