<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumePro | Advanced ATS Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=Source+Code+Pro&display=swap" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        
        /* Layout */
        .editor-container { height: calc(100vh - 64px); }
        .preview-pane { background: #525659; overflow-y: auto; display: flex; justify-content: center; padding: 40px; }
        
        /* The Resume Canvas */
        .resume-canvas {
            width: 210mm; min-height: 297mm; background: white; padding: 15mm 20mm;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: all 0.3s ease;
            color: #000; line-height: 1.5; word-wrap: break-word;
        }

        /* --- TEMPLATES --- */
        /* 1. Professional (ATS Standard) */
        .tpl-pro .section-title { border-bottom: 1.5pt solid #000; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; margin-top: 15px; font-size: 11pt; }
        .tpl-pro .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 10.5pt; }
        .tpl-pro .item-sub { font-style: italic; color: #374151; font-size: 10pt; }

        /* 2. Modern (Accented) */
        .tpl-modern { border-top: 8px solid #2563eb; }
        .tpl-modern .section-title { color: #2563eb; font-weight: 800; font-size: 10pt; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 5px 0; }
        .tpl-modern h1 { font-size: 28pt; font-weight: 800; color: #1e3a8a; }

        /* 3. Executive (Centered) */
        .tpl-exec { text-align: center; }
        .tpl-exec .item-header { justify-content: center; gap: 10px; }
        .tpl-exec .section-title { border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; padding: 4px 0; margin: 20px 0 10px 0; }

        .input-group { border-left: 3px solid #e5e7eb; padding-left: 12px; margin-bottom: 15px; }
        .input-group:focus-within { border-left-color: #2563eb; }
        
        .hidden { display: none !important; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Navigation -->
    <nav class="h-16 bg-white border-b flex justify-between items-center px-8 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 text-white w-8 h-8 rounded flex items-center justify-center font-bold">R</div>
            <span class="font-bold text-xl tracking-tight">ResumePro</span>
        </div>
        
        <div class="flex items-center gap-6">
            <select id="tplSelect" onchange="updateTemplate(this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500">
                <option value="tpl-pro">Template: Professional ATS</option>
                <option value="tpl-modern">Template: Modern Accent</option>
                <option value="tpl-exec">Template: Executive Centered</option>
            </select>
            <button onclick="downloadPDF()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg">Download PDF</button>
            <div id="authArea">
                <button id="loginBtn" class="text-sm font-semibold text-gray-600 underline">Login</button>
            </div>
        </div>
    </nav>

    <div class="flex editor-container">
        <!-- Sidebar Editor -->
        <aside class="w-1/3 bg-white border-r overflow-y-auto p-8 shadow-inner">
            
            <!-- Smart Import -->
            <div class="mb-10 bg-blue-50 p-6 rounded-2xl border border-blue-100">
                <h3 class="text-blue-900 font-bold text-sm uppercase mb-2">Smart Import</h3>
                <input type="file" id="pdfUpload" class="hidden" accept="application/pdf">
                <button onclick="document.getElementById('pdfUpload').click()" class="w-full bg-white border-2 border-blue-400 text-blue-600 py-3 rounded-xl font-bold hover:bg-blue-600 hover:text-white transition">
                    Upload LinkedIn PDF
                </button>
                <p class="text-[10px] text-blue-400 mt-2 text-center">We will auto-structure your experience and education.</p>
            </div>

            <!-- Editor Sections -->
            <div class="space-y-12">
                
                <!-- 1. Contact -->
                <section>
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Contact Information</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="text-[10px] uppercase font-bold text-gray-400">Full Name</label>
                            <input type="text" id="in-name" oninput="sync()" class="w-full border-b py-1 focus:border-blue-500 outline-none font-semibold text-lg">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-400">Email</label>
                            <input type="text" id="in-email" oninput="sync()" class="w-full border-b py-1 text-sm outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-400">Phone</label>
                            <input type="text" id="in-phone" oninput="sync()" class="w-full border-b py-1 text-sm outline-none">
                        </div>
                        <div class="col-span-2">
                            <label class="text-[10px] uppercase font-bold text-gray-400">Location (City, Country)</label>
                            <input type="text" id="in-loc" oninput="sync()" class="w-full border-b py-1 text-sm outline-none">
                        </div>
                    </div>
                </section>

                <!-- 2. Summary -->
                <section>
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Professional Summary</h3>
                    <textarea id="in-sum" oninput="sync()" rows="4" class="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"></textarea>
                </section>

                <!-- 3. Experience -->
                <section id="sec-exp">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Experience</h3>
                        <button onclick="addItem('exp')" class="text-blue-600 text-xs font-bold">+ Add</button>
                    </div>
                    <div id="list-exp" class="space-y-6"></div>
                </section>

                <!-- 4. Education -->
                <section id="sec-edu">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Education</h3>
                        <button onclick="addItem('edu')" class="text-blue-600 text-xs font-bold">+ Add</button>
                    </div>
                    <div id="list-edu" class="space-y-6"></div>
                </section>

                <!-- 5. Skills -->
                <section>
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Skills (Comma Separated)</h3>
                    <textarea id="in-skills" oninput="sync()" placeholder="Java, Spring Boot, Angular..." class="w-full border rounded-lg p-3 text-sm outline-none bg-gray-50"></textarea>
                </section>
            </div>
            <div class="h-20"></div>
        </aside>

        <!-- Preview Pane -->
        <main class="flex-1 preview-pane">
            <div id="resume-canvas" class="tpl-pro">
                <!-- Content Injected via JS -->
            </div>
        </main>
    </div>

    <script>
        // --- 1. CONFIG & DATA STATE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCVgVQGsAReD3zG1NREX9dcl1HifizllaE",
            authDomain: "resume-builder-d94ec.firebaseapp.com",
            projectId: "resume-builder-d94ec",
            storageBucket: "resume-builder-d94ec.firebasestorage.app",
            messagingSenderId: "524704602425",
            appId: "1:524704602425:web:0a7569ae47e80665c670e8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let resume = {
            template: 'tpl-pro',
            name: 'Saurabh Pandey',
            email: 'imsaurabh.sp987@gmail.com',
            phone: '9508744480',
            location: 'Chennai, India',
            summary: '',
            skills: '',
            experience: [],
            education: []
        };

        // --- 2. ENGINE: ADD/REMOVE ITEMS ---
        function addItem(type) {
            const item = type === 'exp' 
                ? { company: '', role: '', date: '', desc: '' }
                : { school: '', degree: '', date: '', score: '' };
            resume[type === 'exp' ? 'experience' : 'education'].push(item);
            renderEditor();
            sync();
        }

        function removeItem(type, index) {
            resume[type === 'exp' ? 'experience' : 'education'].splice(index, 1);
            renderEditor();
            sync();
        }

        // --- 3. UI: EDITOR RENDERING ---
        function renderEditor() {
            // Static Fields
            document.getElementById('in-name').value = resume.name;
            document.getElementById('in-email').value = resume.email;
            document.getElementById('in-phone').value = resume.phone;
            document.getElementById('in-loc').value = resume.location;
            document.getElementById('in-sum').value = resume.summary;
            document.getElementById('in-skills').value = resume.skills;

            // List: Experience
            const expList = document.getElementById('list-exp');
            expList.innerHTML = "";
            resume.experience.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "input-group border-l-4 p-4 bg-gray-50 rounded-r-lg relative";
                div.innerHTML = `
                    <button onclick="removeItem('exp', ${i})" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 text-xs font-bold">REMOVE</button>
                    <input type="text" placeholder="Company Name" value="${item.company}" oninput="resume.experience[${i}].company=this.value;sync()" class="w-full font-bold bg-transparent outline-none mb-1">
                    <input type="text" placeholder="Role / Job Title" value="${item.role}" oninput="resume.experience[${i}].role=this.value;sync()" class="w-full text-sm bg-transparent outline-none mb-1">
                    <input type="text" placeholder="Jan 2022 - Present" value="${item.date}" oninput="resume.experience[${i}].date=this.value;sync()" class="w-full text-xs text-blue-600 font-medium bg-transparent outline-none mb-2">
                    <textarea placeholder="Key Achievements..." oninput="resume.experience[${i}].desc=this.value;sync()" class="w-full text-xs bg-white border p-2 rounded">${item.desc}</textarea>
                `;
                expList.appendChild(div);
            });

            // List: Education
            const eduList = document.getElementById('list-edu');
            eduList.innerHTML = "";
            resume.education.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "input-group border-l-4 p-4 bg-gray-50 rounded-r-lg relative";
                div.innerHTML = `
                    <button onclick="removeItem('edu', ${i})" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 text-xs font-bold">REMOVE</button>
                    <input type="text" placeholder="University / School" value="${item.school}" oninput="resume.education[${i}].school=this.value;sync()" class="w-full font-bold bg-transparent outline-none mb-1">
                    <input type="text" placeholder="Degree / Major" value="${item.degree}" oninput="resume.education[${i}].degree=this.value;sync()" class="w-full text-sm bg-transparent outline-none mb-1">
                    <div class="flex gap-2">
                        <input type="text" placeholder="2019 - 2023" value="${item.date}" oninput="resume.education[${i}].date=this.value;sync()" class="flex-1 text-xs text-blue-600 bg-transparent outline-none">
                        <input type="text" placeholder="Score (Optional)" value="${item.score}" oninput="resume.education[${i}].score=this.value;sync()" class="w-1/3 text-xs bg-transparent outline-none text-right">
                    </div>
                `;
                eduList.appendChild(div);
            });
        }

        // --- 4. ENGINE: REAL-TIME PREVIEW ---
        function sync() {
            // Update Data from Static Fields
            resume.name = document.getElementById('in-name').value;
            resume.email = document.getElementById('in-email').value;
            resume.phone = document.getElementById('in-phone').value;
            resume.location = document.getElementById('in-loc').value;
            resume.summary = document.getElementById('in-sum').value;
            resume.skills = document.getElementById('in-skills').value;

            const canvas = document.getElementById('resume-canvas');
            canvas.className = `resume-canvas ${resume.template}`;

            let html = `
                <div class="text-center mb-6">
                    <h1 class="text-3xl font-bold uppercase tracking-tight mb-1">${resume.name}</h1>
                    <div class="text-xs space-x-2">
                        <span>${resume.email}</span>
                        <span>•</span>
                        <span>${resume.phone}</span>
                        <span>•</span>
                        <span>${resume.location}</span>
                    </div>
                </div>
            `;

            if(resume.summary) {
                html += `<div class="section-title">Summary</div><p class="text-[10pt]">${resume.summary}</p>`;
            }

            if(resume.experience.length > 0) {
                html += `<div class="section-title">Experience</div>`;
                resume.experience.forEach(exp => {
                    html += `
                        <div class="mb-4">
                            <div class="item-header"><span>${exp.company}</span><span>${exp.date}</span></div>
                            <div class="item-sub">${exp.role}</div>
                            <div class="text-[9.5pt] mt-1 whitespace-pre-line">${exp.desc}</div>
                        </div>
                    `;
                });
            }

            if(resume.education.length > 0) {
                html += `<div class="section-title">Education</div>`;
                resume.education.forEach(edu => {
                    html += `
                        <div class="mb-3">
                            <div class="item-header"><span>${edu.school}</span><span>${edu.date}</span></div>
                            <div class="item-sub">${edu.degree} ${edu.score ? '— '+edu.score : ''}</div>
                        </div>
                    `;
                });
            }

            if(resume.skills) {
                html += `<div class="section-title">Skills</div><p class="text-[10pt]">${resume.skills}</p>`;
            }

            canvas.innerHTML = html;
        }

        function updateTemplate(val) {
            resume.template = val;
            sync();
        }

        // --- 5. SMART PDF PARSER (Optimized for structured text) ---
        document.getElementById('pdfUpload').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    content.items.forEach(item => fullText.push(item.str));
                }
                processStructuredText(fullText.join("\n"));
            };
            reader.readAsArrayBuffer(file);
        };

        function processStructuredText(text) {
            // Reset Arrays
            resume.experience = [];
            resume.education = [];

            // 1. Basic Identity
            const lines = text.split('\n').filter(l => l.trim().length > 1);
            resume.name = lines[0] || "";

            // 2. Summary
            const summaryMatch = text.match(/Summary\s*(.*?)\s*(Experience|Education|Skills|$)/s);
            if (summaryMatch) resume.summary = summaryMatch[1].trim();

            // 3. Skills
            const skillsMatch = text.match(/Top Skills\s*(.*?)\s*(Languages|Certifications|Experience|$)/s);
            if (skillsMatch) resume.skills = skillsMatch[1].replace(/\n/g, ', ').trim();

            // 4. Experience Parsing (Improved Logic)
            const expPart = text.split(/Experience/i)[1]?.split(/Education/i)[0];
            if(expPart) {
                const expLines = expPart.split('\n').filter(l => l.trim().length > 0);
                let currentItem = null;

                expLines.forEach(line => {
                    // Detect Date Range
                    if(line.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec|Present|\d{4})/i)) {
                        if(currentItem) currentItem.date = line.trim();
                    } 
                    // Detect Company/Role (If line is short and doesn't contain common words)
                    else if (line.length < 50 && line.length > 2) {
                        if(currentItem) resume.experience.push(currentItem);
                        currentItem = { company: line.trim(), role: 'Role Placeholder', date: '', desc: '' };
                    }
                    else {
                        if(currentItem) currentItem.desc += line + "\n";
                    }
                });
                if(currentItem) resume.experience.push(currentItem);
            }

            // 5. Education Parsing
            const eduPart = text.split(/Education/i)[1];
            if(eduPart) {
                const eduLines = eduPart.split('\n').filter(l => l.trim().length > 0);
                for(let i=0; i < eduLines.length; i+=2) {
                    if(eduLines[i]) {
                        resume.education.push({
                            school: eduLines[i].trim(),
                            degree: eduLines[i+1] ? eduLines[i+1].trim() : "",
                            date: "",
                            score: ""
                        });
                    }
                }
            }

            renderEditor();
            sync();
            alert("Parsing complete! We've categorized your data into the fields below.");
        }

        // Initial Run
        renderEditor();
        sync();

        function downloadPDF() {
            const element = document.getElementById('resume-canvas');
            const opt = { margin: 0, filename: 'Resume.pdf', html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
